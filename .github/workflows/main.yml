name: Build Java Project with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build shadowJar  # 明确执行 shadowJar 任务

      # 调试步骤 - 查看生成的 JAR 文件
      - name: Debug - List built JARs
        run: |
          echo "=== Looking for JAR files in base module ==="
          ls -la base/build/libs/ || echo "base/build/libs/ not found"
          
          echo "=== Looking for JAR files everywhere ==="
          find . -name "*.jar" -type f | sort
          
          echo "=== File sizes ==="
          find . -name "*.jar" -type f -exec ls -lh {} \;

      # 上传 JAR 文件 - 重点在这里
      - name: Upload JAR as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThePitUltimate
          # ShadowJAR 通常生成在 base/build/libs/ 目录下
          # 使用通配符匹配所有可能的 JAR 文件
          path: |
            base/build/libs/*.jar
            **/build/libs/*.jar
          if-no-files-found: error  # 如果没有找到文件，让工作流失败
          retention-days: 30

      # 可选：如果只想上传特定的 Shadow JAR
      - name: Upload Shadow JAR specifically
        uses: actions/upload-artifact@v4
        with:
          name: ThePitUltimate-Shadow
          path: base/build/libs/*-all.jar  # Shadow 插件通常生成 -all.jar 文件
          if-no-files-found: warn
          retention-days: 30
