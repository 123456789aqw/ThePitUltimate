name: Hello World  # 工作流程的名称

on: [push]  # 触发条件：当代码被推送到仓库的任何分支时，运行此工作流程

jobs:  # 定义要执行的任务
  say-hello:  # 任务的ID
    runs-on: ubuntu-latest  # 运行任务的环境：使用最新版的Ubuntu虚拟机
    steps:  # 定义任务的具体步骤
      - name: Checkout code  # 步骤1：获取你的项目代码
        uses: actions/checkout@v4  # 使用一个官方action来完成代码检出

      - name: Say Hello  # 步骤2：打印一条消息
        run: echo "Hello, World!"  # 实际运行的命令
