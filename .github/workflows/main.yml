name: Build ThePitUltimate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean shadowJar --no-daemon

      - name: List built JARs
        run: |
          echo "=== Build directory structure ==="
          find . -name "*.jar" -type f | sort
          echo "=== JAR file sizes ==="
          find . -name "*.jar" -type f -exec ls -lh {} \;

      - name: Upload JAR as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThePitUltimate-Build
          path: |
            **/build/libs/*.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-javadoc.jar
          if-no-files-found: error
          retention-days: 30

      - name: Upload Shadow JAR specifically
        uses: actions/upload-artifact@v4
        with:
          name: ThePitUltimate-Shadow
          path: base/build/libs/ThePitUltimate.jar
          if-no-files-found: warn
          retention-days: 30
