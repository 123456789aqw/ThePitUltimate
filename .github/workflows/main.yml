// base/build.gradle

plugins {
    id 'java'
    id 'kotlin'
    id 'com.github.johnrengelman.shadow' version '8.1.1'  // 确保有这个插件
}

// 确保所有依赖都被打包
shadowJar {
    // 打包所有运行时依赖
    configurations = [project.configurations.runtimeClasspath]
    
    // 设置打包后的 JAR 文件名
    archiveFileName = 'ThePitUltimate.jar'
    
    // 合并 META-INF 服务文件（对于 SPI 很重要）
    mergeServiceFiles()
    
    // 处理重复文件
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
    exclude 'META-INF/LICENSE*'
    exclude 'META-INF/NOTICE*'
    
    // 依赖冲突时优先使用最新版本
    append 'META-INF/services/**'
    
    // 解决 Kotlin 模块信息冲突
    exclude '**/*.kotlin_module'
    
    // 打印打包的依赖信息
    doLast {
        println "ShadowJAR 打包完成！"
        println "包含的依赖库："
        configurations.runtimeClasspath.each { dep ->
            println "  - ${dep.name}"
        }
    }
}

// 确保构建任务依赖于 shadowJar
build.dependsOn shadowJar

// 可选：禁用普通的 jar 任务，只生成 shadowJar
jar {
    enabled = false  // 不生成普通的 base.jar
}

// 确保所有必要的依赖都被标记为 runtimeOnly 或 implementation
dependencies {
    // 确保 adventure-platform-bukkit 被包含（根据之前的错误）
    implementation 'net.kyori:adventure-platform-bukkit:4.3.2'
    
    // 其他依赖确保使用 implementation 而不是 compileOnly
    // 例如：
    // implementation 'org.apache.commons:commons-lang3:3.12.0'
    // implementation 'com.google.guava:guava:31.1-jre'
    
    // 注意：如果有些依赖是 provided 级别的（比如 Bukkit API），应该保持 compileOnly
    compileOnly 'org.spigotmc:spigot-api:1.8.8-R0.1-SNAPSHOT'
}
